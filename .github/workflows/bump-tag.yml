name: Bump Patch Tag

on:
  repository_dispatch:
    types: [base-image-updated]

permissions:
  contents: write

jobs:
  bump-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PR_BYPASS_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Compute and push next patch tag
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            echo "No semver tags found." >&2
            exit 1
          fi

          VERSION="${LATEST#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"

          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest tag: ${LATEST} → new tag: ${NEW_TAG}"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
